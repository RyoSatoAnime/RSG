<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>RYO SATO GAMES</title>
<link rel="icon" href="/RSG/favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" href="/RSG/favicon/favicon.svg" type="image/svg+xml" />
<link rel="shortcut icon" href="/RSG/favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/RSG/favicon/apple-touch-icon.png" />
<link rel="manifest" href="/RSG/favicon/site.webmanifest" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin:0; background:#000; color:#fff; }
  body {
    font-family: -apple-system, Arial, Arial Black, Helvetica, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* 固定リボン + リスト1段相当。隠れによる「スクロール不能」を防ぐ */
    padding-bottom: calc(56px + clamp(72px, 10vmin, 120px) + env(safe-area-inset-bottom, 0px));
  }
  a { color: inherit; text-decoration: none; }

  /* Header */
  .header { background:#000; position: sticky; top:0; z-index: 10; }
  .brand-row {
    display:flex; align-items:center; justify-content:center; gap:16px;
    padding: 22px 24px 18px;
    border-bottom: 2px solid #fff;
  }
  .brand {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    line-height: 0;
  }
  .brand-logo {
    display: block;
    height: clamp(30px, 4.6vw, 48px);
    width: auto;
    max-width: min(100%, calc(100vw - 48px));
    object-fit: contain;
  }
  /* 文字列は非表示（画像の alt / 文脈用フォールバック。読み上げは alt のみ） */
  .brand-fallback {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
    font-family: -apple-system, Arial Black, Arial, Helvetica, sans-serif;
    font-size: clamp(30px, 4.6vw, 48px);
    font-weight: 1000;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .brand-fallback .r { color: #cc0000; }
  .brand-fallback .g { color: #006600; }

  /* Main */
  .main {
    padding: clamp(28px, 6vmin, 56px) 24px 0;
    min-height: calc(100dvh - 120px);
  }
  .row {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center; 
    gap: 8px;
  }
  .title {
    font-family: -apple-system, Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: clamp(20px, 4.6vw, 40px);
    letter-spacing: 1px;
  }
  .play-btn {
    display:inline-flex; align-items:center; justify-content:center;
    min-width: 160px; height: 60px;
    padding: 0 22px;
    background:#17cbe3; color:#000;
    font-weight: 700; 
    font-family: -apple-system, Arial, Helvetica, sans-serif;
    font-size: clamp(22px, 2.6vw, 30px);
    transition: transform .06s ease, filter .06s ease;
    outline: none;
    cursor: pointer; user-select: none; touch-action: manipulation;
  }
  .play-btn:hover { filter: brightness(1.08); }
  .play-btn:active { transform: translateY(1px) scale(0.99); }
  .play-btn:focus-visible { outline: 3px solid #17cbe3; outline-offset: 2px; }

  /* Footer ribbon */
  .ribbon {
    position: fixed; inset-inline: 0; bottom:0;
    height: 56px;
    background: #cfcfcf;
    display: flex; align-items: center; justify-content: flex-end;
    /* 46px ボタン + 上下5px = 56px → 上・下・右の余白を 5px で揃える */
    padding: 5px;
  }
  .yt-link {
  width: 46px;
  height: 46px;
  border-radius: 10px;
  background: #FF0000;
  display: grid; place-items: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.35);
  border: 2px solid #FF0000;
  margin-right: 10px;
}
.yt-link svg { width: 28px; height: 28px; }
.yt-link:hover { filter: brightness(1.1); }
}
.yt-link svg {
  width: 36px; height: 36px;
}
.yt-link:hover { filter: brightness(1.1); }

  .x-link {
    width: 46px; height: 46px; border-radius: 10px;
    background:#000; display:grid; place-items:center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    border: 2px solid #000;
  }
  .x-link img { width: 24px; height: 24px; object-fit: contain; display: block; }
  .x-link:hover { filter: brightness(1.1); }

  @media (max-width: 680px) {
    .play-btn { min-width: 140px; height: 54px; }
    .main { padding-top: 24px; }
  }
    .play-btn { min-width: 140px; height: 54px; }
    .main { padding-top: 24px; }
  }
  .title .t-custom {
  color: var(--accent, inherit);
  font-style: var(--title-style, normal);
}
.play-btn {
  background: var(--btn-bg, #222);
  color: var(--btn-fg, #fff);
  border: 1px solid var(--btn-border, transparent);
  transition: transform .05s ease, opacity .15s ease;
}

.play-btn:hover { opacity: .9; transform: translateY(-1px); }
.play-btn:active { transform: translateY(0); }

.t-red {
  color: #f10;
}

.t-ita{
    font-style: italic
  }

.t-stroke {
  --sw: 1.2px;
  --stroke: #fff;
  --fill: #000;

  color: var(--fill);
  paint-order: stroke fill;

  -webkit-text-stroke: var(--sw) var(--stroke);
  text-stroke: var(--sw) var(--stroke);

  text-shadow:
    0 0   0 var(--stroke),
    1px 0 0 var(--stroke), -1px 0 0 var(--stroke),
    0 1px 0 var(--stroke),  0 -1px 0 var(--stroke),
    1px 1px 0 var(--stroke), -1px 1px 0 var(--stroke),
    1px -1px 0 var(--stroke), -1px -1px 0 var(--stroke);
}

.t1 {
  --stroke: #f10;
  --fill: #000;
  font-style: italic;
}

.t2 {
  --stroke: #fff;
  --fill: #000;
  font-style: normal;
}

  .MB-ita {
    font-style: italic
  }
</style>

<style>
.rows{
  width: min(980px, calc(100vw - 48px));
  margin: 0 auto;
  display: grid;
  gap: 36px;
}

.row{
  display: grid;
  grid-template-columns: 1fr var(--btn-w, 320px);
  align-items: center;
  column-gap: 24px;
  width: 100%;
}

.title{ justify-self: start; text-align: left; }
.play-btn{ justify-self: end; width: 100%; text-align: center; }

.row{
  grid-template-columns: 2.5fr 0.8fr;
}
.play-btn{ width:100%; }

</style>

</head>
<body>

<main class="main">
  <div class="rows">

<div class="row"

<div class="row"
     style="--btn-bg:#390; --btn-fg:#000; --btn-border:#390;">
  <div class="title">JALOON</div>

</div>

<div class="row"
     style="--btn-bg:#f10; --btn-fg:#000; --btn-border:#f10;">

<div class="row"
     style="--btn-bg:#000; --btn-fg:#fff; --btn-border:#fff;">
  <div class="title"><span class="t-ita">MIDNIGHT</span> <span class="t-stroke MB-ita">BLACKTOP</span></div>
  <a class="play-btn" href="./mb/midnightblacktop.html" role="button">Play</a>

  </div>
</main>

<div class="ribbon" role="contentinfo">
  <a class="yt-link" href="https://www.youtube.com/channel/UCL4OlV-ENGAmArx9-Uhtb7A" aria-label="YouTube channel">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <polygon points="6,4 21,12 6,21" fill="#fff"/>

  <a class="x-link" href="https://x.com/RyoSatoAnime" aria-label="X profile">

</body>
</html>
